server:
  port: 8081

spring:
  application:
    name: micro-chat-messaging-service

  datasource:
    url: jdbc:postgresql://localhost:5432/quiz
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/chat_messages_db

    redis:
      host: localhost
      port: 6379


